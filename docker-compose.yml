services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: "${POSTGRES_DB:-shiliu}"
      POSTGRES_USER: "${POSTGRES_USER:-shiliu}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-shiliu_dev_password}"
    ports:
      - "${POSTGRES_PORT:-15432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 10s
      timeout: 5s
      retries: 10

  ocr-service:
    build:
      context: ./ocr-service
    environment:
      OCR_LANG: "${OCR_LANG:-ch}"
      OCR_MODEL_PROFILE: "${OCR_MODEL_PROFILE:-mobile}"
      OCR_USE_TEXTLINE_ORIENTATION: "${OCR_USE_TEXTLINE_ORIENTATION:-true}"
      OCR_USE_DOC_ORIENTATION: "${OCR_USE_DOC_ORIENTATION:-false}"
      OCR_USE_DOC_UNWARPING: "${OCR_USE_DOC_UNWARPING:-false}"
      OCR_ENABLE_MKLDNN: "${OCR_ENABLE_MKLDNN:-false}"
      OCR_MAX_FILE_MB: "${OCR_MAX_FILE_MB:-15}"
      FLAGS_use_mkldnn: "${FLAGS_use_mkldnn:-0}"
      FLAGS_use_onednn: "${FLAGS_use_onednn:-0}"
    ports:
      - "${OCR_PORT:-9000}:9000"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:9000/health', timeout=3).read()\""]
      interval: 15s
      timeout: 5s
      retries: 20

  backend:
    build:
      context: ./backend
    depends_on:
      postgres:
        condition: service_healthy
      ocr-service:
        condition: service_healthy
    environment:
      SERVER_PORT: "8080"
      SPRING_DATASOURCE_URL: "jdbc:postgresql://postgres:5432/${POSTGRES_DB:-shiliu}"
      SPRING_DATASOURCE_DRIVER_CLASS_NAME: "org.postgresql.Driver"
      SPRING_DATASOURCE_USERNAME: "${POSTGRES_USER:-shiliu}"
      SPRING_DATASOURCE_PASSWORD: "${POSTGRES_PASSWORD:-shiliu_dev_password}"
      SPRING_JPA_HIBERNATE_DDL_AUTO: "${SPRING_JPA_HIBERNATE_DDL_AUTO:-update}"
      SHILIU_H2_CONSOLE_ENABLED: "false"
      SHILIU_PUBLIC_BASE_URL: "${SHILIU_PUBLIC_BASE_URL:-http://localhost:8080}"
      SHILIU_ADMIN_TOKEN: "${SHILIU_ADMIN_TOKEN:-dev-admin-token}"
      SHILIU_AGENT_ALLOWED_PROJECT_ROOTS: "${SHILIU_AGENT_ALLOWED_PROJECT_ROOTS:-/app/workspace}"
      SHILIU_FILE_STORAGE_DIR: "/app/data/files"
      SHILIU_OCR_HTTP_ENDPOINT: "http://ocr-service:9000/ocr"
      SHILIU_LLM_ENABLED: "${SHILIU_LLM_ENABLED:-true}"
      SHILIU_LLM_API_BASE_URL: "${SHILIU_LLM_API_BASE_URL:-}"
      SHILIU_LLM_API_KEY: "${SHILIU_LLM_API_KEY:-}"
      SHILIU_LLM_MODEL: "${SHILIU_LLM_MODEL:-deepseek-v3.2}"
      SHILIU_FEISHU_API_BASE_URL: "${SHILIU_FEISHU_API_BASE_URL:-https://open.feishu.cn/open-apis}"
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    volumes:
      - backend-files:/app/data/files
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/api/v1/health >/dev/null"]
      interval: 15s
      timeout: 5s
      retries: 20

volumes:
  postgres-data:
  backend-files:
