server:
  port: "${SERVER_PORT:8000}"

spring:
  application:
    name: shiliu-ai-backend
  servlet:
    multipart:
      max-file-size: "${SPRING_SERVLET_MULTIPART_MAX_FILE_SIZE:10MB}"
      max-request-size: "${SPRING_SERVLET_MULTIPART_MAX_REQUEST_SIZE:12MB}"
  datasource:
    url: "${SPRING_DATASOURCE_URL:jdbc:h2:file:./data/shiliu-v1}"
    driver-class-name: "${SPRING_DATASOURCE_DRIVER_CLASS_NAME:org.h2.Driver}"
    username: "${SPRING_DATASOURCE_USERNAME:sa}"
    password: "${SPRING_DATASOURCE_PASSWORD:}"
  h2:
    console:
      enabled: "${SHILIU_H2_CONSOLE_ENABLED:false}"
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: "${SPRING_JPA_HIBERNATE_DDL_AUTO:update}"
    open-in-view: false
    show-sql: false

shiliu:
  public-base-url: "${SHILIU_PUBLIC_BASE_URL:http://localhost:8000}"
  admin-token: "${SHILIU_ADMIN_TOKEN:dev-admin-token}"
  file-storage-dir: "${SHILIU_FILE_STORAGE_DIR:./data/files}"
  agent:
    allowed-project-roots: "${SHILIU_AGENT_ALLOWED_PROJECT_ROOTS:/home/chase/GitHub/shiliu-ai-v1}"
  codex:
    enabled: "${SHILIU_CODEX_ENABLED:true}"
    binary: "${SHILIU_CODEX_BINARY:codex}"
    working-dir: "${SHILIU_CODEX_WORKING_DIR:/home/chase/GitHub/shiliu-ai-v1}"
    allowed-working-roots: "${SHILIU_CODEX_ALLOWED_WORKING_ROOTS:${SHILIU_CODEX_WORKING_DIR:/home/chase/GitHub/shiliu-ai-v1}}"
    timeout-seconds: "${SHILIU_CODEX_TIMEOUT_SECONDS:110}"
    extra-args: "${SHILIU_CODEX_EXTRA_ARGS:}"
    home: "${SHILIU_CODEX_HOME:}"
  task-cleanup:
    # 设置 true 后启动时会清空 task_items 表（用于团队上线时一次性清理演示任务）。
    # 默认 false，避免后续每次启动都误删团队任务。
    enabled: "${SHILIU_TASK_CLEANUP_ENABLED:false}"
  ocr:
    http-endpoint: "${SHILIU_OCR_HTTP_ENDPOINT:http://localhost:9000/ocr}"
  llm:
    enabled: "${SHILIU_LLM_ENABLED:true}"
    api-base-url: "${SHILIU_LLM_API_BASE_URL:}"
    api-key: "${SHILIU_LLM_API_KEY:}"
    model: "${SHILIU_LLM_MODEL:gpt-4o-mini}"
  feishu:
    api-base-url: "${SHILIU_FEISHU_API_BASE_URL:https://open.feishu.cn/open-apis}"
